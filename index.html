<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat Pro</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #1e1f22, #2b2d31);
    color: white;
}

header {
    background: #5865F2;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    display: flex;
    justify-content: space-between;
}

a {
    color: white;
    text-decoration: none;
}

#chat {
    height: 70vh;
    overflow-y: auto;
    padding: 20px;
}

.mensaje {
    margin-bottom: 10px;
    display: flex;
}

.usuario-msg {
    justify-content: flex-end;
}

.bot-msg {
    justify-content: flex-start;
}

.burbuja {
    padding: 12px;
    border-radius: 15px;
    max-width: 60%;
}

.usuario-burbuja {
    background: #5865F2;
}

.bot-burbuja {
    background: #3a3c43;
}

footer {
    display: flex;
    padding: 10px;
    background: #1e1f22;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #383a40;
    color: white;
}

button {
    margin-left: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #57F287;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    💬 Chat Pro
    <div>
        <a href="/clear">🗑️</a>
        <a href="/logout">Salir</a>
    </div>
</header>

<div id="chat">
    {% for msg in mensajes %}
        <div class="mensaje usuario-msg">
            <div class="burbuja usuario-burbuja">{{ msg.text }}</div>
        </div>

        <div class="mensaje bot-msg">
            <div class="burbuja bot-burbuja">{{ msg.response }}</div>
        </div>
    {% endfor %}
</div>

<footer>
    <input type="text" id="pregunta">
    <button onclick="responder()">Enviar</button>
</footer>

<script>
function responder() {
    let input = document.getElementById("pregunta");
    let chat = document.getElementById("chat");

    if (input.value === "") return;

    chat.innerHTML += `
        <div class="mensaje usuario-msg">
            <div class="burbuja usuario-burbuja">${input.value}</div>
        </div>
    `;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({mensaje: input.value})
    })
    .then(res => res.json())
    .then(data => {
        chat.innerHTML += `
            <div class="mensaje bot-msg">
                <div class="burbuja bot-burbuja">${data.respuesta}</div>
            </div>
        `;
        chat.scrollTop = chat.scrollHeight;
    });

    input.value = "";
}

window.onload = () => {
    let chat = document.getElementById("chat");
    chat.scrollTop = chat.scrollHeight;
};
</script>

</body>
</html>
